<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BERSOAL - Generator Soal HOTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <div id="sidebarBackdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 bg-[#4f46e5] text-white flex-col h-full shadow-2xl z-40 fixed md:relative hidden md:flex transition-all">
        <div class="h-20 flex items-center px-6 border-b border-white/10">
            <img src="logo.png" alt="Logo BERSOAL" class="h-10 w-auto object-contain rounded-xl bg-white p-1 shadow-md mr-3">
            <div>
                <h1 class="text-xl font-bold tracking-wide">Bersoal</h1>
                <p class="text-[10px] text-indigo-200 tracking-wider font-semibold">EVALUASI PEMBELAJARAN</p>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 bg-white/20 px-4 py-3 rounded-xl font-medium transition-colors text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                Generator Soal
            </a>
        </nav>
        <div class="px-4 pb-6 text-center">
            <p class="text-xs text-indigo-300">Versi 1.3</p>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-8 z-10 flex-shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="bg-indigo-600 text-white rounded-lg p-2 hover:bg-indigo-700 active:scale-95 transition-all shadow-sm cursor-pointer z-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <img src="logo.png" alt="Logo" class="h-8 w-auto md:hidden rounded-md bg-white p-1 shadow-sm border border-slate-100">
                <h1 class="text-lg font-bold text-slate-800 md:hidden">Bersoal</h1>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-6 py-6 sm:px-10 sm:py-8 border-b border-slate-200 bg-slate-50/50 flex flex-col gap-1">
                        <div class="flex items-center gap-3 mb-1">
                            <div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>
                            <h2 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight">Konfigurasi Instrumen Soal</h2>
                        </div>
                        <p class="text-slate-500 text-sm ml-4 sm:ml-4">Tentukan parameter di bawah ini untuk menghasilkan butir soal analitis sesuai kurikulum.</p>
                    </div>

                    <form action="/generate" method="POST" id="formSoal" class="p-6 sm:p-8 md:px-10 md:py-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Mata Pelajaran</label>
                                <select id="mataPelajaran" name="mataPelajaran" onchange="updateMateri()" class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                                    <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                                    <option value="Bahasa Inggris">Bahasa Inggris (English)</option>
                                    <option value="Matematika">Matematika</option>
                                    <option value="Informatika" selected>Informatika</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Kelas & Fase</label>
                                <select id="jenjang" name="jenjang" onchange="updateMateri()" class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                                    <option value="Kelas 10 (Fase E)">Kelas X (Fase E)</option>
                                    <option value="Kelas 11 (Fase F)">Kelas XI (Fase F)</option>
                                    <option value="Kelas 12 (Fase F)">Kelas XII (Fase F)</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Jenis Soal</label>
                                <select id="jenisSoal" name="jenisSoal" onchange="toggleJenisSoal()" class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                                    <option value="Pilihan Ganda" selected>Pilihan Ganda</option>
                                    <option value="Uraian">Uraian</option>
                                    <option value="Campuran">Campuran (PG & Uraian)</option>
                                </select>
                            </div>

                            <div id="jumlahSoalGroup">
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
                                    Jumlah Soal <span class="text-indigo-500 normal-case font-semibold text-[11px] ml-0.5">(Maks. 25)</span>
                                </label>
                                <input type="number" id="jumlahSoal" name="jumlahSoal" min="1" max="25" value="5" class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                            </div>
                        </div>

                        <div id="campuranGroup" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Jumlah Pilihan Ganda</label>
                                <input type="number" id="jumlahPG" name="jumlahPG" min="1" max="25" value="10" class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Jumlah Uraian</label>
                                <input type="number" id="jumlahUraian" name="jumlahUraian" min="1" max="10" value="5" class="w-full px-4 py-3.5 text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Konteks Materi Pembelajaran</label>
                            <select id="materi" name="materi" class="w-full px-4 py-3.5 min-h-[60px] text-sm rounded-xl border border-slate-200 bg-white text-slate-700 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all whitespace-normal shadow-sm">
                                <!-- Terisi otomatis -->
                            </select>
                        </div>
                        
                        <div class="pt-4">
                            <button type="submit" id="btnSubmit" class="w-full bg-slate-800 hover:bg-slate-900 active:scale-[0.99] text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all text-sm flex justify-center items-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                Buat Instrumen Soal
                            </button>
                        </div>

                        <div id="loadingInfo" class="hidden flex-col items-center justify-center p-6 bg-slate-50 rounded-xl border border-slate-200">
                            <div class="animate-spin w-8 h-8 border-4 border-slate-800 border-t-transparent rounded-full mb-3"></div>
                            <p class="text-slate-800 font-bold text-sm text-center">Sistem Sedang Memproses...</p>
                            <p class="text-slate-500 text-xs text-center mt-1">Mengonstruksi soal dan merakit file PDF...</p>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        sidebar.classList.toggle('hidden');
        sidebar.classList.toggle('flex');
        if (window.innerWidth < 768) { backdrop.classList.toggle('hidden'); }
    }

    function toggleJenisSoal() {
        const jenis = document.getElementById('jenisSoal').value;
        const groupUtama = document.getElementById('jumlahSoalGroup');
        const groupCampuran = document.getElementById('campuranGroup');
        const inputUtama = document.getElementById('jumlahSoal');

        if (jenis === 'Campuran') {
            groupUtama.classList.add('hidden');
            groupCampuran.classList.remove('hidden');
            groupCampuran.classList.add('grid');
            inputUtama.removeAttribute('required');
        } else {
            groupUtama.classList.remove('hidden');
            groupCampuran.classList.add('hidden');
            groupCampuran.classList.remove('grid');
            inputUtama.setAttribute('required', 'true');
        }
    }

    const dataKurikulum = {
        "Bahasa Indonesia": {
            "Kelas 10 (Fase E)": ["Teks Laporan Hasil Observasi", "Teks Eksposisi", "Teks Anekdot", "Hikayat & Cerita Rakyat", "Teks Negosiasi", "Biografi", "Puisi"],
            "Kelas 11 (Fase F)": ["Teks Prosedur", "Teks Eksplanasi", "Ceramah", "Cerpen", "Proposal", "Karya Ilmiah", "Resensi"],
            "Kelas 12 (Fase F)": ["Surat Lamaran Pekerjaan", "Teks Sejarah", "Teks Editorial/Tajuk Rencana", "Artikel dan Kritik Sastra", "Drama"]
        },
        "Bahasa Inggris": {
            "Kelas 10 (Fase E)": ["Descriptive, Recount, and Narrative Text", "Grammar: Simple Present, Past Tense, Pronouns"],
            "Kelas 11 (Fase F)": ["Analytical Exposition, Hortatory Exposition, Procedure", "Grammar: Passive Voice, Conditional Sentences"],
            "Kelas 12 (Fase F)": ["Application Letter & CV", "News Item & Explanation Text", "Grammar: Direct/Indirect Speech, Causative Verbs"]
        },
        "Matematika": {
            "Kelas 10 (Fase E)": ["Eksponen dan Logaritma", "Barisan dan Deret", "Sistem Persamaan Linear", "Fungsi Kuadrat", "Statistika Dasar", "Trigonometri Dasar"],
            "Kelas 11 (Fase F)": ["Matriks", "Fungsi Komposisi & Invers", "Lingkaran", "Transformasi Geometri", "Statistika Lanjut (Data Kelompok)", "Peluang"],
            "Kelas 12 (Fase F)": ["Limit Fungsi Aljabar & Trigonometri", "Turunan Fungsi", "Integral Tak Tentu & Tentu", "Geometri Ruang (Dimensi Tiga)"]
        },
        "Informatika": {
            "Kelas 10 (Fase E)": ["Berpikir Komputasional", "Sistem Komputer", "Jaringan Komputer dan Internet", "Algoritma dan Pemrograman (Logika Dasar)", "Analisis Data"],
            "Kelas 11 (Fase F)": ["Strategi Algoritmik", "Array, Fungsi, Rekursi", "Arsitektur Jaringan & Cybersecurity", "Basis Data (SQL)", "Siklus Pengembangan (SDLC)"],
            "Kelas 12 (Fase F)": ["Kecerdasan Buatan (AI)", "Internet of Things (IoT)", "Big Data & Cloud Computing", "Kriptografi & Keamanan Informasi", "Project-Based Praktik Lintas Bidang"]
        }
    };

    function updateMateri() {
        const mataPelajaran = document.getElementById("mataPelajaran").value;
        const jenjang = document.getElementById("jenjang").value;
        const materiDropdown = document.getElementById("materi");
        materiDropdown.innerHTML = "";
        
        dataKurikulum[mataPelajaran][jenjang].forEach(materi => {
            const opsi = document.createElement("option");
            opsi.value = materi;
            opsi.textContent = materi;
            materiDropdown.appendChild(opsi);
        });
    }

    window.onload = () => {
        updateMateri();
        toggleJenisSoal();
    };

    document.getElementById('formSoal').addEventListener('submit', function() {
        document.getElementById('btnSubmit').classList.add('hidden');
        document.getElementById('loadingInfo').classList.remove('hidden');
        document.getElementById('loadingInfo').classList.add('flex');
    });
</script>
</body>
</html>
